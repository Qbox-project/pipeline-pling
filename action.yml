name: Pipeline Pling
author: Qbox Project
description: Send clear, customizable GitHub push notifications to Discord.
branding:
  icon: bell
  color: yellow

inputs:
  webhook-url:
    description: Discord webhook URL used to send notifications.
    required: true
  thread-id:
    description: Discord forum thread ID to post into.
    required: false
  skip-bots:
    description: Skip pushes made by bot accounts.
    required: false
    default: "true"
  anon-keyword:
    description: Commit-body keyword that fully anonymizes a commit.
    required: false
    default: "!anon"
  silent-keyword:
    description: Commit-body keyword that omits a commit from notifications.
    required: false
    default: "!silent"
  branch-allowlist:
    description: Comma-separated branch names to include in notifications.
    required: false
  branch-denylist:
    description: Comma-separated branch names to exclude from notifications.
    required: false
  accent-color:
    description: Fallback Discord accent color as #RRGGBB or RRGGBB; branch-colors takes priority.
    required: false
  use-sender-avatar:
    description: Use the push sender's GitHub avatar as the webhook avatar.
    required: false
    default: "true"
  use-repo-username:
    description: Use the repository name as the webhook username.
    required: false
    default: "true"
  repo-name:
    description: Override the repository label and webhook username.
    required: false
  hide-links:
    description: Remove GitHub links and the View changes button from notifications.
    required: false
    default: "false"
  compact-mode:
    description: Display commits on consecutive lines without descriptions or authors.
    required: false
    default: "false"
  branch-colors:
    description: Per-branch accent colors as pattern=#RRGGBB entries separated by commas or newlines.
    required: false
  name-anon-users:
    description: Comma-separated GitHub usernames shown as Anonymous while commit details remain visible.
    required: false
  full-anon-users:
    description: Comma-separated GitHub usernames whose authored or co-authored commits are fully redacted.
    required: false

runs:
  using: node24
  main: dist/index.js
