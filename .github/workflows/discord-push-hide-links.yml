# act-only: hide-links scenario (branch never pushed in CI)
name: Discord Push Notification (act hide-links)

on:
  push:
    branches: [__act_only_hide_links__]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord
        uses: ./
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          thread-id: ${{ vars.DISCORD_THREAD_ID }}
          hide-links: 'true'
