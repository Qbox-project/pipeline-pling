# act-only: branch-colors scenario (branch never pushed in CI)
name: Discord Push Notification (act branch-colors)

on:
  push:
    branches: [__act_only_branch_colors__]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord
        uses: ./
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          thread-id: ${{ vars.DISCORD_THREAD_ID }}
          branch-colors: |
            main=#22c55e
            develop=#ef4444
            fix/*=#f97316
